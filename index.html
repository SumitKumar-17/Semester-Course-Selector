<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sem IX Course Planner — CS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">CS</span>
    <div class="brand-text">
      <h1>Semester IX Registration Ledger</h1>
      <p>Department of Computer Science — pick 3 electives + 1 course you TA</p>
    </div>
  </div>
  <div class="topbar-actions">
    <input type="search" id="searchBox" placeholder="Search code, title, or faculty…">
    <a class="github-link" href="https://github.com/SumitKumar-17/Semester-Course-Selector" target="_blank" rel="noopener" title="View on GitHub" aria-label="View on GitHub">
      <svg viewBox="0 0 16 16" width="20" height="20" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
          -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07
          -1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82
          a7.6 7.6 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
          .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
          0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
      </svg>
    </a>
  </div>
</header>

<main class="layout">

  <section class="panel catalogue" aria-label="Course catalogue">
    <div class="panel-head">
      <h2>Catalogue</h2>
      <div class="panel-head-right">
        <span class="pool-stat" id="poolStat"></span>
        <button class="ghost-btn" id="collapseAllBtn" data-action="collapse-toggle">Collapse all</button>
        <span class="panel-sub">grouped by slot — one pick per slot</span>
      </div>
    </div>
    <div id="catalogueBody" class="catalogue-body"></div>
  </section>

  <section class="panel selection" aria-label="Your semester">
    <div class="panel-head">
      <h2>My Semester</h2>
      <span class="panel-sub">4 of 4 picks</span>
    </div>

    <div class="slot-map" id="slotMap" aria-label="Slot occupancy map"></div>

    <div class="still-needed" id="stillNeeded"></div>

    <div class="picks" id="picksBody"></div>

    <div class="credits-total" id="creditsTotal"></div>

    <div class="footer-note">
      Selections, completed courses, and tough-course flags are saved on this device only.
    </div>
  </section>

</main>

<section class="panel completed-panel" aria-label="Completed courses">
  <div class="panel-head">
    <h2>Completed Courses</h2>
    <span class="panel-sub" id="completedCount"></span>
  </div>
  <div id="completedBody" class="completed-body"></div>
</section>

<div id="toast" class="toast" role="status" aria-live="polite">
  <span class="toast-icon" id="toastIcon"></span>
  <span class="toast-msg" id="toastMsg"></span>
  <span class="toast-bar" id="toastBar"></span>
</div>

<script src="data.js"></script>
<script src="toast.js"></script>
<script src="state.js"></script>
<script src="render.js"></script>
<script src="main.js"></script>
</body>
</html>
